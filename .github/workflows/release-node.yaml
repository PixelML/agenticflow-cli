name: release-node

on:
  push:
    tags:
      - "npm-v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Node tag (npm-vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate operation-id mappings
        run: |
          python3 scripts/check_operation_id_mappings.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Validate tag and sync package version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.version_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "${TAG}" =~ ^npm-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Expected npm-vX.Y.Z, got: ${TAG}" >&2
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"
          npm version "${VERSION}" --no-git-tag-version
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure npm supports trusted publishing
        run: |
          npm i -g npm@11.5.1
          npm --version

      - name: Pack npm artifact
        run: |
          npm pack

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: AgenticFlow CLI Node Wrapper v${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            *.tgz

      - name: Publish to npm (Trusted Publishing)
        run: |
          npm publish --access public
